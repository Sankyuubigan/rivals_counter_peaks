<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="in_game.css">
    <title>In-Game Overlay</title>
</head>
<body>
    <div id="tray-container">
        <div class="top-row">
            <div class="box allies-box">
                <div class="box-title" id="lbl-allies">Союзники</div>
                <div id="allies-list" class="hero-list"></div>
            </div>
            
            <div class="box map-box" id="map-box-container">
                <div id="map-not-found-warning" class="map-not-found" data-i18n="map_not_found">Карта не найдена</div>
                <div id="map-name" class="map-title">Ожидание матча...</div>
            </div>
            
            <div class="box enemies-box">
                <div class="box-title" id="lbl-enemies">Враги</div>
                <div id="enemies-list" class="hero-list"></div>
            </div>
        </div>

        <div class="bottom-row">
            <div id="counters-list" class="hero-list counters-scroll"></div>
        </div>
    </div>
    <script src="../../translations.js"></script>
    <script src="in_game.js"></script>
</body>
</html>
